{% extends 'base.html' %}

{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">

    <h2 class="text-2xl font-bold text-center mb-6">
        Verify OTP
    </h2>

    <form method="post">

        {% csrf_token %}

        <div class="mb-4">

            <label class="block mb-2">
                Enter Verification Code
            </label>

            {{ form.otp }}

        </div>

        <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-xl">

            Verify

        </button>

    </form>

</div>

{% endblock %}
