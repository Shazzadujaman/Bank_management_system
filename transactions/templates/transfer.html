{% extends 'base.html' %}

{% block title %}Transfer Money{% endblock %}

{% block content %}

<div class="max-w-md mx-auto bg-white shadow-lg rounded-xl p-6">

    <h2 class="text-2xl font-bold text-center mb-6 text-blue-600">
        Transfer Money
    </h2>

    <form method="post">

        {% csrf_token %}

        <div class="mb-4">
            <label class="block mb-1">
                Receiver Account Number
            </label>

            {{ form.account_no }}
        </div>

        <div class="mb-4">
            <label class="block mb-1">
                Amount
            </label>

            {{ form.amount }}
        </div>

        <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">

            Send Money

        </button>

    </form>

</div>

{% endblock %}
